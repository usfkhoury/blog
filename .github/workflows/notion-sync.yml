name: Sync Notion to Hugo

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # manual trigger via GitHub UI

# Prevent two sync runs from overlapping. If a run is already in progress,
# the new one waits rather than cancels, so no sync window is lost.
concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run Notion sync
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node notion-to-hugo.js

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync posts from Notion [skip ci]"
            git push
          fi
