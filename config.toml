baseurl = "https://usfkhoury.com/"
locale = "en-us"
title = "Youssef El Khoury"
theme = "hugo-theme-stack"
paginate = 5

enableRobotsTXT = true

[params]
  mainSections = ["blog"]
  featuredImageField = "image"
  rssFullContent = true

[params.footer]
  since = 2020

[params.dateFormat]
  published = "Jan 02, 2006"
  lastUpdated = "Jan 02, 2006 15:04 MST"

[params.sidebar]
  subtitle = "My personal blog, exploring and documenting the Lebanese tradition of doing things yourself"
  compact = false
  avatar = "https://usfkhoury.com/images/main/logo.jpg"

[params.article]
  math = false
  toc = true
  readingTime = true

[params.article.license]
  enabled = false

[params.comments]
  enabled = false

[params.widgets]
  enabled = ["search", "archives", "tag-cloud"]

[params.widgets.archives]
  limit = 5

[params.widgets.tagCloud]
  limit = 10

